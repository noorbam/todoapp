name: todo_game
description: KidQuest — A gamified to-do app for children with parental controls.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.2
  google_sign_in: ^6.2.2

  # State Management
  provider: ^6.1.2

  # UI / Animations
  confetti: ^0.7.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  cached_network_image: ^3.3.1

  # Utils
  intl: 0.20.2
  shared_preferences: ^2.3.2
  uuid: ^4.4.2

  # Icons
  cupertino_icons: ^1.0.8
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
